<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #0d6efd,
        #6610f2
    );
}

.login-card{

    width:100%;
    max-width:420px;

    border:none;
    border-radius:20px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 10px 30px rgba(0,0,0,.2);

    overflow:hidden;
}

.card-header{

    text-align:center;
    padding:30px;
    background:white;
    border:none;
}

.logo{
    font-size:60px;
}

.card-body{
    background:white;
    padding:30px;
}

.form-control{
    border-radius:10px;
}

.btn-login{
    border-radius:10px;
    padding:12px;
    font-weight:bold;
}

.home-link{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card card">

<div class="card-header">

<div class="logo">
🔐
</div>

<h3 class="mt-2">
Admin Login
</h3>

<p class="text-muted">
Vandurai Events
</p>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter username"
required>

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter password"
required>

</div>

<button
type="submit"
class="btn btn-primary btn-login w-100">

Login

</button>

</form>

<div class="text-center mt-3">

<a href="/"
class="home-link">

← Back to Home

</a>

</div>

</div>

</div>

</body>
</html>
