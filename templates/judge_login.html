{% extends "base.html" %}
{% block title %}Judge Login{% endblock %}
{% block content %}<main class="container py-5" style="max-width:480px"><div class="card shadow-sm"><div class="card-body p-4"><h3>Competition Judge Login</h3>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}<form method="post"><input class="form-control mb-3" name="username" placeholder="Username" required><input class="form-control mb-3" type="password" name="password" placeholder="Password" required><button class="btn btn-primary w-100">Login</button></form></div></div></main>{% endblock %}
