<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
{% block title %}
Event Management System
{% endblock %}
</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<!-- Google Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- Custom CSS -->

<link rel="stylesheet"
href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<a href="https://wa.me/919999999999" class="whatsapp">
    <i class="bi bi-whatsapp"></i>
</a>

<a href="#" class="top-btn">

</a>

<a href="#"
class="top-btn">

<i class="bi bi-arrow-up"></i>

</a>
<body>

<!-- TOP BAR -->

<div class="top-bar">

<div class="container-fluid d-flex justify-content-between align-items-center">

    <div class="welcome-text">
        🏛 தமிழ்நாடு அரசு நிகழ்ச்சி மேலாண்மை தளம் |
        Welcome All Participants 👋
    </div>

    <div class="clock-box">
        <i class="bi bi-calendar-event"></i>
        <span id="clock"></span>
    </div>

</div>
</div>

<!-- MODERN NAVBAR -->

<nav class="navbar navbar-expand-lg modern-navbar">

    <div class="container">

        <div class="row w-100 align-items-center">

            <!-- Logo & Title -->
            <div class="col-lg-7 col-md-8 col-10">

                <a class="navbar-brand d-flex align-items-center m-0" href="/">

                    <img src="{{ url_for('static', filename='images/logo.png') }}"
                         class="logo-img"
                         alt="Logo">

                    <div class="ms-3">

                       <h2 class="brand-title mb-0">
            SRI VANDURAI EVENTS
        </h2>

        <h5 class="brand-location mb-1">
            THANJAVUR
        </h5>

        <small class="brand-subtitle">
            Organize • Manage • Celebrate • Success
        </small>

                    </div>

                </a>

            </div>

            <!-- Toggle Button -->
            <div class="col-lg-5 col-md-4 col-2 text-end">

                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#menu">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse justify-content-end mt-3 mt-lg-0"
     id="menu">

    <ul class="navbar-nav ms-auto">

        <li class="nav-item">
            <a class="nav-link home-link" href="/">
                <i class="bi bi-house-fill"></i> Home
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link register-link" href="/register">
                <i class="bi bi-person-plus-fill"></i> Registration
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link admin-link" href="/login">
                <i class="bi bi-shield-lock-fill"></i> Admin
            </a>
        </li>

    </ul>

                </div>

            </div>

        </div>

    </div>

</nav>

<!-- CONTENT -->

{% block content %}
{% endblock %}

<!-- FOOTER -->

<footer>

<div class="container">

<div class="row">

<div class="col-md-6">

© 2026 Event Management System

</div>

<div class="col-md-6 text-end">

Developed by
ARULRAJAN V

</div>

</div>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static',filename='js/script.js') }}"></script>
