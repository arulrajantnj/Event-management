{% extends "admin/admin_base.html" %}

{% block title %}Edit Exam Subject{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header bg-success text-white">Edit Subject</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Subject Name</label>
                        <input type="text" name="subject_name" class="form-control" value="{{ subject.subject_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4">{{ subject.description or '' }}</textarea>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if subject.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active subject</label>
                    </div>
                    <button class="btn btn-success">Save Subject</button>
                    <a href="{{ url_for('admin.manage_event_exams', event_id=subject.event_id) }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
