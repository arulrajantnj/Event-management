{% extends "admin/admin_base.html" %}

{% block title %}Export Participants{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-success text-white">
        <i class="fa-solid fa-file-excel"></i>
        Export Participants to Excel
    </div>
    <div class="card-body">
        <form method="GET" action="{{ url_for('admin.export') }}">
            <input type="hidden" name="download" value="1">

            <label class="form-label fw-bold">Select Event / Events</label>
            <select name="event_id" class="form-select" multiple size="8">
                {% for event in events %}
                <option value="{{ event.id }}" {% if event.id in selected_event_ids %}selected{% endif %}>
                    {{ event.name }}
                </option>
                {% endfor %}
            </select>
            <div class="form-text">
                Hold Ctrl and click to choose multiple events. Leave all unselected to download all events.
            </div>

            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-success">
                    <i class="fa-solid fa-download"></i>
                    Download Excel
                </button>
                <a href="{{ url_for('admin.export') }}" class="btn btn-outline-secondary">Clear Selection</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
