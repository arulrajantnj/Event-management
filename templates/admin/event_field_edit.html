{% extends "admin/admin_base.html" %}

{% block title %}Edit Event Field{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-xl-7">
        <div class="card">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <span>Edit Event Field</span>
                <a href="{{ url_for('admin.edit_event', id=event.id) }}" class="btn btn-sm btn-light">
                    Back to Event
                </a>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Field Key</label>
                        <input type="text" name="custom_field_name" class="form-control" value="{{ field.field_name }}" {% if field.field_name in ['teacher_name', 'mobile'] %}readonly{% endif %}>
                        <input type="hidden" name="field_name" value="__custom__">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Field Label</label>
                        <input type="text" name="field_label" class="form-control" value="{{ field.field_label }}" required>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Field Type</label>
                            <select name="field_type" class="form-select">
                                {% for value, label in field_type_choices %}
                                <option value="{{ value }}" {% if field.field_type == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Data Type</label>
                            <select name="data_type" class="form-select">
                                {% for value, label in data_type_choices %}
                                <option value="{{ value }}" {% if field.data_type == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Placeholder</label>
                        <input type="text" name="placeholder" class="form-control" value="{{ field.placeholder or '' }}">
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Drop Down Options</label>
                        <textarea name="options_text" class="form-control" rows="4">{{ field.options_text or '' }}</textarea>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Help Text</label>
                        <input type="text" name="help_text" class="form-control" value="{{ field.help_text or '' }}">
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Display Order</label>
                        <input type="number" name="sort_order" class="form-control" value="{{ field.sort_order }}">
                    </div>

                    <div class="form-check mt-3">
                        <input class="form-check-input" type="checkbox" name="is_required" id="is_required" {% if field.is_required %}checked{% endif %}>
                        <label class="form-check-label" for="is_required">Required field</label>
                    </div>

                    <div class="form-check mt-2 mb-4">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if field.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Visible on registration form</label>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-success">
                            Save Field
                        </button>
                        <a href="{{ url_for('admin.edit_event', id=event.id) }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
