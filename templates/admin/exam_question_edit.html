{% extends "admin/admin_base.html" %}

{% block title %}Edit Question{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-success text-white">Edit Question</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Question Type</label>
                        <select name="question_type" class="form-select">
                            {% for value, label in question_type_choices %}
                            <option value="{{ value }}" {% if question.question_type == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Question</label>
                        <textarea name="question_text" class="form-control" rows="3" required>{{ question.question_text }}</textarea>
                    </div>
                    <div class="mb-2"><input type="text" name="option_a" class="form-control" value="{{ question.option_a }}" placeholder="Option A"></div>
                    <div class="mb-2"><input type="text" name="option_b" class="form-control" value="{{ question.option_b }}" placeholder="Option B"></div>
                    <div class="mb-2"><input type="text" name="option_c" class="form-control" value="{{ question.option_c }}" placeholder="Option C"></div>
                    <div class="mb-3"><input type="text" name="option_d" class="form-control" value="{{ question.option_d }}" placeholder="Option D"></div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Correct Option</label>
                            <select name="correct_option" class="form-select">
                                <option value="" {% if not question.correct_option %}selected{% endif %}>Not Applicable</option>
                                {% for value, label in answer_option_choices %}
                                <option value="{{ value }}" {% if question.correct_option == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Marks</label>
                            <input type="number" step="0.5" name="marks" class="form-control" value="{{ question.marks }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Order</label>
                            <input type="number" name="sort_order" class="form-control" value="{{ question.sort_order }}">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Model Answer</label>
                        <textarea name="model_answer" class="form-control" rows="3">{{ question.model_answer or '' }}</textarea>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Explanation</label>
                        <textarea name="explanation" class="form-control" rows="3">{{ question.explanation or '' }}</textarea>
                    </div>
                    <div class="form-check mt-3 mb-3">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if question.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active question</label>
                    </div>
                    <button class="btn btn-success">Save Question</button>
                    <a href="{{ url_for('admin.edit_online_exam', exam_id=question.exam_id) }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
