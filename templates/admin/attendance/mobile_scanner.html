<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Mobile QR Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/attendance.css') }}">
    <style>
        body{background:#eef3ff;}
        .mobile-shell{max-width:760px;margin:auto;padding:14px;}
    </style>
</head>
<body>
<div class="mobile-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-0">QR Attendance</h4>
            <div class="text-muted small">{{ scanner_name }}</div>
        </div>
        <a href="{{ url_for('attendance.scanner_logout') }}" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>

    {% if not locked_event_id %}
    <form method="GET" class="mb-3">
        <select name="event_id" class="form-select" onchange="this.form.submit()">
            <option value="">All Events</option>
            {% for event in events %}
            <option value="{{ event.id }}" {% if selected_event_id == event.id %}selected{% endif %}>{{ event.name }}</option>
            {% endfor %}
        </select>
    </form>
    {% endif %}

    <div class="card mb-3">
        <div class="card-body">
            <div id="qr-reader" class="qr-reader"></div>
            <input type="hidden" id="attendanceEventId" value="{{ selected_event_id or '' }}">
            <select id="cameraSelect" class="form-select mt-3"></select>
            <div class="d-flex gap-2 mt-3">
                <button id="startScanner" class="btn btn-success flex-fill"><i class="fa-solid fa-camera"></i> Start</button>
                <button id="stopScanner" class="btn btn-secondary flex-fill"><i class="fa-solid fa-stop"></i> Stop</button>
            </div>
            <input id="scanDelay" type="hidden" value="1500">
            <input id="soundEnabled" type="checkbox" checked hidden>
            <input id="vibrationEnabled" type="checkbox" checked hidden>
        </div>
    </div>

    <div id="scanResult" class="attendance-result card">
        <div class="card-body text-center text-muted py-5">Scan a participant QR code.</div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="{{ url_for('static', filename='js/security.js') }}"></script>
<script src="{{ url_for('static', filename='js/attendance.js') }}"></script>
</body>
</html>
