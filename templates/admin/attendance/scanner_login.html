<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scanner Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef3ff;}
        .scanner-login{width:100%;max-width:420px;border:0;border-radius:16px;box-shadow:0 12px 32px rgba(15,23,42,.18);}
    </style>
</head>
<body>
<div class="card scanner-login">
    <div class="card-header bg-success text-white text-center py-4">
        <i class="fa-solid fa-qrcode fa-3x mb-2"></i>
        <h3 class="mb-0">QR Scanner Login</h3>
    </div>
    <div class="card-body p-4">
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input name="username" class="form-control form-control-lg" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input name="password" type="password" class="form-control form-control-lg" required>
            </div>
            <button class="btn btn-success btn-lg w-100">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
