<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">

<title>Certificate Layout Editor</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery UI -->
<link href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">

<style>
{% for font in fonts %}
{% if font.file %}
@font-face {
    font-family: "{{ font.name }}";
    src: url("{{ url_for('static', filename='fonts/' + font.file) }}");
}
{% endif %}
{% endfor %}

/* fallback safety styles */
#certificateCanvas {
    position: relative;
    width: 1100px;
    max-width: 1100px;
    height: 700px;
    margin: 24px auto;
    border: 2px solid #ddd;
    overflow: hidden;
    background: #fff;
}

.certificate-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.draggable-field {
    position: absolute;
    padding: 5px 10px;
    border: 1px dashed #333;
    background: rgba(255,255,255,0.6);
    cursor: move;
    z-index: 2;
    min-width: 80px;
    min-height: 30px;
    user-select: none;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.15;
    white-space: normal;
    overflow: hidden;
}

.draggable-field.selected .ui-resizable-handle {
    display: block;
    width: 12px;
    height: 12px;
    background: #dc3545;
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 1px #dc3545;
    z-index: 20;
}

.draggable-field.selected .ui-resizable-n,
.draggable-field.selected .ui-resizable-s {
    left: 50%;
    margin-left: -6px;
}

.draggable-field.selected .ui-resizable-e,
.draggable-field.selected .ui-resizable-w {
    top: 50%;
    margin-top: -6px;
}

.wording-content {
    width: 100%;
    height: 100%;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
    overflow: hidden;
}

.photo-box {
    width: 120px;
    height: 120px;
    text-align: center;
    line-height: 120px;
}

.qr-box {
    width: 100px;
    height: 100px;
    text-align: center;
    line-height: 100px;
}

.template-error {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b00020;
    font-weight: 600;
    background: #fff5f5;
    z-index: 1;
}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- ================= LEFT PANEL ================= -->
<div class="col-md-2 bg-dark text-white vh-100 p-3">

<h4 class="mb-3">Layout Editor</h4>

<div class="list-group">

<button class="list-group-item list-group-item-action field-btn" data-field="appreciation_text">
Appreciation Wording
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="teacher_name">
Teacher Name
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="salutation">
Salutation
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="designation">
Designation
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="subject">
Subject
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="school_name">
School Name
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="school_area">
School Area
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="block">
Block
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="registration_id">
Registration ID
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="date">
Date
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="qr_code">
QR Code
</button>

<button class="list-group-item list-group-item-action field-btn" data-field="teacher_photo">
Teacher Photo
</button>

</div>

</div>

<!-- ================= CENTER PANEL ================= -->
<div class="col-md-8 p-3 text-center">

<h3 class="mb-3">Certificate Designer</h3>

<div class="certificate-scroll-area">
<div id="certificateCanvas"
     data-template="{{ template.id }}">

<!-- Background -->
<img
src="{{ template_image_url }}"
class="certificate-bg"
alt="Certificate template"
draggable="false"
onerror="this.insertAdjacentHTML('afterend', '<div class=&quot;template-error&quot;>Certificate template image could not load.</div>'); this.style.display='none';">

<!-- Dynamic fields will be injected here by JS -->

</div>
</div>

</div>

<!-- ================= RIGHT PANEL ================= -->
<div class="col-md-2 bg-light vh-100 p-3">

<h4>Properties</h4>

<hr>

<div id="wordingProperty" class="mb-3 d-none">
<label for="textContent" class="form-label">Certificate Wording</label>
<div class="btn-toolbar gap-1 mb-2" id="wordingToolbar">
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="bold"><b>B</b></button>
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="italic"><i>I</i></button>
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="underline"><u>U</u></button>
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="justifyLeft">Left</button>
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="justifyCenter">Centre</button>
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="justifyRight">Right</button>
<button type="button" class="btn btn-sm btn-outline-secondary rich-command" data-command="justifyFull">Justify</button>
</div>
<div class="row g-2 mb-2">
<div class="col-4"><input type="color" id="selectionColor" class="form-control form-control-color w-100" title="Selected text colour"></div>
<div class="col-8"><select id="selectionFont" class="form-select" title="Selected text font">
<option value="">Selection font…</option>{% for font in fonts %}<option value="{{ font.name }}">{{ font.name }}</option>{% endfor %}
</select></div>
<div class="col-4"><select id="selectionSize" class="form-select" title="Selected text size">
<option value="">Size…</option><option value="2">Small</option><option value="3">Normal</option><option value="4">Large</option><option value="5">Larger</option><option value="6">Very large</option>
</select></div>
<div class="col-8"><select id="insertWordingTag" class="form-select">
<option value="">Insert tag…</option>
<option value="salutation">Salutation</option><option value="teacher_name">Teacher name</option><option value="designation">Designation</option>
<option value="subject">Subject</option><option value="school_name">School name</option>
<option value="school_area">School area</option><option value="block">Block</option>
<option value="registration_id">Registration ID</option><option value="date">Date</option>
</select></div>
</div>
<div id="textContent" class="form-control text-start" contenteditable="true" role="textbox"
aria-label="Certificate wording" style="min-height:120px;max-height:240px;overflow:auto"></div>
<div class="form-text">Drag and resize the wording box on the certificate.</div>
<div class="row g-2 mt-1">
<div class="col-6">
<label for="wordingWidth" class="form-label">Width</label>
<input type="number" id="wordingWidth" class="form-control" min="100" max="1080" step="10">
</div>
<div class="col-6">
<label for="wordingHeight" class="form-label">Height</label>
<input type="number" id="wordingHeight" class="form-control" min="30" max="680" step="10">
</div>
</div>
</div>

<label>Font Size</label>
<input type="number" id="fontSize" class="form-control" value="14" min="6" max="120">

<br>

<label>Text Color</label>
<input type="color" id="fontColor" class="form-control form-control-color" value="#000000">

<br>

<label>Font Family</label>
<select id="fontFamily" class="form-select">
{% for font in fonts %}
<option value="{{ font.name }}" {% if font.name == "Arial" %}selected{% endif %}>{{ font.name }}</option>
{% endfor %}
</select>

<br>

<label>Upload Font</label>
<form id="fontUploadForm" enctype="multipart/form-data">
<input type="file" id="fontFile" name="font" class="form-control" accept=".ttf,.otf,.woff,.woff2">
<button type="submit" class="btn btn-outline-primary w-100 mt-2">
Upload Font
</button>
</form>

<br>

<label>Photo Shape</label>
<select id="photoShape" class="form-select">
<option value="rectangle">Rectangle</option>
<option value="circle">Circle</option>
<option value="rounded">Rounded</option>
</select>

<br>

<button id="saveLayout" class="btn btn-success w-100">
💾 Save Layout
</button>

<button id="hideSelectedField" class="btn btn-outline-danger w-100 mt-2" type="button">
Hide Selected Field
</button>

<br><br>

<a href="/admin" class="btn btn-secondary w-100">
Back
</a>

</div>

</div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script src="{{ url_for('static', filename='js/security.js') }}"></script>

<script>
let templateId = $("#certificateCanvas").data("template");
let fieldsData = [];
let selectedField = null;
const defaultFontSize = 14;
const defaultFontFamily = "Noto Sans Tamil";

// ================= LOAD LAYOUT =================
$(document).ready(function () {

    $.get(`/api/layout/${templateId}`, function (data) {

        fieldsData = data;
        renderFields();

    });

});

// ================= RENDER FIELDS =================
function renderFields() {

    $(".draggable-field").remove();

    fieldsData.forEach(field => {

        if (field.visible === false) return;

        let div = $(`
            <div class="draggable-field" id="${field.field_name}">
                ${displayFieldText(field)}
            </div>
        `);

        div.css({
            left: field.x + "px",
            top: field.y + "px",
            width: field.width + "px",
            height: field.height + "px",
            fontSize: field.font_size + "px",
            fontFamily: field.font_family || defaultFontFamily,
            color: field.font_color,
            fontWeight: field.font_weight || "600",
            textAlign: field.text_align || "left",
            transform: `rotate(${field.rotation}deg)`
        });

        ensureFontOption(field.font_family || defaultFontFamily);

        if (field.shape === "circle") div.addClass("circle");
        if (field.shape === "rounded") div.addClass("rounded-photo");

        $("#certificateCanvas").append(div);

        makeDraggable(div);
    });
}

// ================= DRAG + RESIZE =================
function makeDraggable(element) {

    element.on("click", function () {
        selectField($(this));
    });

    element.draggable({
        containment: "#certificateCanvas",
        stop: function () {
            updateField($(this));
        }
    });

    element.resizable({
        handles: "n,e,s,w,se,sw,ne,nw",
        minWidth: 80,
        minHeight: 30,
        containment: "#certificateCanvas",
        resize: function () {
            if ($(this).attr("id") === "appreciation_text") {
                syncWordingDimensions($(this));
            }
        },
        stop: function () {
            updateField($(this));
        }
    });
}

// ================= SELECT FIELD =================
function selectField(el) {

    $(".draggable-field").removeClass("selected");

    el.addClass("selected");

    selectedField = el;

    $("#fontSize").val(parseInt(el.css("font-size"), 10) || defaultFontSize);
    $("#fontColor").val(rgbToHex(el.css("color")) || "#000000");

    let fontFamily = cleanFontFamily(el.css("font-family")) || defaultFontFamily;

    ensureFontOption(fontFamily);
    $("#fontFamily").val(fontFamily);

    let field = fieldsData.find(f => f.field_name === el.attr("id"));
    let isWording = field && field.field_name === "appreciation_text";
    $("#wordingProperty").toggleClass("d-none", !isWording);
    $("#textContent").html(isWording ? (field.text_content || "") : "");
    if (isWording) syncWordingDimensions(el);
}

function syncWordingDimensions(el) {
    $("#wordingWidth").val(Math.round(el.width()));
    $("#wordingHeight").val(Math.round(el.height()));
}

function displayFieldText(field) {
    if (field.field_name === "appreciation_text") {
        return `<div class="wording-content">${field.text_content || "Appreciation wording"}</div>`;
    }
    return field.field_name.replaceAll("_", " ");
}

// ================= UPDATE FIELD =================
function updateField(el) {

    let id = el.attr("id");

    let field = fieldsData.find(f => f.field_name === id);

    if (field) {

        field.x = el.position().left;
        field.y = el.position().top;
        field.width = el.width();
        field.height = el.height();
        field.font_size = parseInt(el.css("font-size"), 10) || defaultFontSize;
        field.font_family = cleanFontFamily(el.css("font-family")) || defaultFontFamily;
        field.font_color = rgbToHex(el.css("color")) || "#000000";
        field.font_weight = el.css("font-weight") || "600";
        field.text_align = el.css("text-align") || "left";
        field.shape =
            el.hasClass("circle") ? "circle" :
            el.hasClass("rounded-photo") ? "rounded" :
            "rectangle";
    }
}

// ================= ADD / SELECT PLACEHOLDER =================
$(".field-btn").click(function () {

    let fieldName = $(this).data("field");
    let existing = fieldsData.find(f => f.field_name === fieldName);

    if (existing && existing.visible === false) {
        existing.visible = true;
        existing.x = 40;
        existing.y = 40;
        renderFields();
    }

    if (!existing) {
        existing = {
            field_name: fieldName,
            x: 40,
            y: 40,
            width: fieldName === "appreciation_text" ? 500 : 120,
            height: fieldName === "appreciation_text" ? 80 : 28,
            font_size: defaultFontSize,
            font_family: defaultFontFamily,
            font_color: "#000000",
            font_weight: "600",
            text_align: "left",
            shape: "rectangle",
            rotation: 0,
            visible: true
        };

        if (fieldName === "appreciation_text") {
            existing.text_content = "In appreciation of your valuable participation and contribution.";
            existing.text_align = "center";
        }

        fieldsData.push(existing);
        renderFields();
    }

    selectField($("#" + fieldName));
});

$("#hideSelectedField").click(function () {
    if (!selectedField) {
        alert("Select a certificate field first.");
        return;
    }

    const field = fieldsData.find(item => item.field_name === selectedField.attr("id"));
    if (!field) return;
    field.visible = false;
    selectedField.remove();
    selectedField = null;
    $("#wordingProperty").addClass("d-none");
});

// ================= PROPERTIES =================
$("#textContent").on("input", function () {
    if (!selectedField) return;
    let field = fieldsData.find(f => f.field_name === selectedField.attr("id"));
    if (!field || field.field_name !== "appreciation_text") return;
    field.text_content = $(this).html();
    selectedField.find(".wording-content").html(field.text_content || "Appreciation wording");
});

$(".rich-command").on("mousedown", function (event) {
    event.preventDefault();
    document.execCommand($(this).data("command"), false, null);
    $("#textContent").trigger("input").focus();
});

$("#selectionColor").on("input", function () {
    document.execCommand("foreColor", false, $(this).val());
    $("#textContent").trigger("input").focus();
});

$("#selectionFont").on("change", function () {
    if (!this.value) return;
    document.execCommand("fontName", false, this.value);
    $("#textContent").trigger("input").focus();
    this.value = "";
});

$("#selectionSize").on("change", function () {
    if (!this.value) return;
    document.execCommand("fontSize", false, this.value);
    $("#textContent").trigger("input").focus();
    this.value = "";
});

$("#insertWordingTag").on("change", function () {
    if (!this.value) return;
    $("#textContent").focus();
    const tagText = "{" + "{" + this.value + "}" + "}";
    document.execCommand("insertText", false, tagText);
    this.value = "";
    $("#textContent").trigger("input");
});

$("#wordingWidth, #wordingHeight").on("input change", function () {
    if (!selectedField || selectedField.attr("id") !== "appreciation_text") return;

    const canvas = $("#certificateCanvas");
    const maxWidth = Math.max(100, canvas.innerWidth() - selectedField.position().left);
    const maxHeight = Math.max(30, canvas.innerHeight() - selectedField.position().top);
    const width = Math.min(maxWidth, Math.max(100, Number($("#wordingWidth").val()) || 100));
    const height = Math.min(maxHeight, Math.max(30, Number($("#wordingHeight").val()) || 30));

    selectedField.width(width).height(height);
    syncWordingDimensions(selectedField);
    updateField(selectedField);
});

$("#fontSize").on("input", function () {

    if (!selectedField) return;

    selectedField.css("font-size", $(this).val() + "px");
    updateField(selectedField);
});

$("#fontColor").on("input", function () {

    if (!selectedField) return;

    selectedField.css("color", $(this).val());
    updateField(selectedField);
});

$("#fontFamily").change(function () {

    if (!selectedField) return;

    selectedField.css("font-family", $(this).val());
    updateField(selectedField);
});

$("#photoShape").change(function () {

    let target = selectedField || $("#teacher_photo");
    let shape = $(this).val();

    target.removeClass("circle rounded-photo");

    if (shape === "circle") target.addClass("circle");
    if (shape === "rounded") target.addClass("rounded-photo");

    updateField(target);
});

// ================= FONT UPLOAD =================
$("#fontUploadForm").submit(function (event) {

    event.preventDefault();

    let file = $("#fontFile")[0].files[0];

    if (!file) {
        alert("Please choose a font file.");
        return;
    }

    let formData = new FormData();
    formData.append("font", file);

    $.ajax({
        url: "/api/upload-font",
        type: "POST",
        data: formData,
        contentType: false,
        processData: false,
        success: function (response) {
            addUploadedFont(response.font);
            $("#fontFile").val("");
            alert("Font uploaded successfully.");
        },
        error: function (xhr) {
            let message = xhr.responseJSON && xhr.responseJSON.error
                ? xhr.responseJSON.error
                : "Font upload failed";
            alert(message);
        }
    });
});

function addUploadedFont(font) {

    if (!font || !font.name || !font.file) return;

    ensureFontOption(font.name);

    if (!$(`#fontFamily option[value="${cssEscape(font.name)}"]`).length) {
        $("#fontFamily").append(
            $("<option></option>").val(font.name).text(font.name)
        );
    }

    let fontFace = new FontFace(
        font.name,
        `url("/static/fonts/${font.file}")`
    );

    fontFace.load().then(function (loadedFace) {
        document.fonts.add(loadedFace);
        $("#fontFamily").val(font.name).trigger("change");
    });
}

function ensureFontOption(fontFamily) {

    if (!fontFamily) return;

    let escapedValue = cssEscape(fontFamily);

    if (!$(`#fontFamily option[value="${escapedValue}"]`).length) {
        $("#fontFamily").append(
            $("<option></option>").val(fontFamily).text(fontFamily)
        );
    }
}

function cssEscape(value) {

    if (window.CSS && CSS.escape) {
        return CSS.escape(value);
    }

    return String(value).replaceAll("\\", "\\\\").replaceAll('"', '\\"');
}

// ================= SAVE =================
$("#saveLayout").click(function () {

    $.ajax({
        url: "/api/save-layout",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({
            template_id: templateId,
            fields: fieldsData
        }),
        success: function () {
            alert("Layout Saved Successfully!");
        },
        error: function () {
            alert("Error saving layout");
        }
    });

});

function cleanFontFamily(value) {

    if (!value) return "";

    return value.split(",")[0].replaceAll('"', "").replaceAll("'", "").trim();
}

function rgbToHex(rgb) {

    if (!rgb || !rgb.startsWith("rgb")) return rgb;

    let nums = rgb.match(/\d+/g);

    if (!nums || nums.length < 3) return "#000000";

    return (
        "#" +
        nums.slice(0, 3).map(x =>
            ("0" + parseInt(x, 10).toString(16)).slice(-2)
        ).join("")
    );
}

</script>

</body>
</html>
