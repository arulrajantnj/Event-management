{% extends "base.html" %}

{% block title %}Online Exam Login{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white py-3">
                    <h3 class="mb-0">Online Exam Portal Login</h3>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Registration ID</label>
                            <input type="text" name="reg_id" class="form-control" placeholder="EVT2026XXXXXXX" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" name="mobile" class="form-control" placeholder="9876543210" required>
                        </div>
                        <button class="btn btn-primary w-100">Login to Exam Portal</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
