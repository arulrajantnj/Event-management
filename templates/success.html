<!DOCTYPE html>
<html>
<head>

<title>Registration Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Registration Successful</h3>

</div>

<div class="card-body text-center">

<h4>
Registration ID:
{{ participant.reg_id }}
</h4>

<hr>

<h5>QR Code</h5>

<img src="/qrcode/{{ participant.reg_id }}"
     width="250"
     class="border p-2">

<br><br>

<a href="/qrcode/{{ participant.reg_id }}"
   target="_blank"
   class="btn btn-primary">

Download QR Code

</a>

<hr>

<p>
<strong>Name:</strong>
{{ participant.name }}
</p>

<p>
<strong>Mobile:</strong>
{{ participant.mobile }}
</p>

<p>
<strong>Email:</strong>
{{ participant.email }}
</p>

<a href="/register"
   class="btn btn-success">

New Registration

</a>

<a href="/"
   class="btn btn-secondary">

Home

</a>

</div>

</div>

</div>

</body>
</html>
