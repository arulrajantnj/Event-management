<!DOCTYPE html>
<html>
<head>

<title>Participant Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Participant Registration</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input type="text"
       name="name"
       class="form-control"
       required>

</div>

<div class="col-md-6 mb-3">

<label>Mobile</label>

<input type="text"
       name="mobile"
       class="form-control"
       required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email"
       name="email"
       class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>District</label>

<input type="text"
       name="district"
       class="form-control">

</div>

</div>

<div class="mb-3">

<label>School / Organization</label>

<input type="text"
       name="organization"
       class="form-control">

</div>

<div class="mb-3">

<label>Designation</label>

<input type="text"
       name="designation"
       class="form-control">

</div>

<div class="mb-3">

<label>Category</label>

<select name="category"
        class="form-select">

<option>Teacher</option>
<option>Student</option>
<option>Volunteer</option>
<option>Guest</option>

</select>

</div>

<button type="submit"
        class="btn btn-success">

Register

</button>

<a href="/"
   class="btn btn-secondary">

Home

</a>

</form>

</div>

</div>

</div>

</body>
</html>
