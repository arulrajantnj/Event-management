<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Participant Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fb;
}

.header-banner{
    background:linear-gradient(135deg,#198754,#0d6efd);
    color:white;
    padding:40px;
    border-radius:20px 20px 0 0;
    text-align:center;
}

.registration-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.form-control,
.form-select{
    border-radius:10px;
}

.btn-register{
    padding:12px;
    font-weight:bold;
    border-radius:10px;
}

.form-label{
    font-weight:600;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card registration-card">

<div class="header-banner">

<h2>📝 Participant Registration</h2>

<p class="mb-0">
Register for the Event Management Program
</p>

</div>

<div class="card-body p-4">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Full Name
</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter participant name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Mobile Number
</label>

<input
type="text"
name="mobile"
class="form-control"
placeholder="10 digit mobile number"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Email Address
</label>

<input
type="email"
name="email"
class="form-control"
placeholder="example@gmail.com">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
District
</label>

<input
type="text"
name="district"
class="form-control"
placeholder="Enter district">

</div>

</div>

<div class="mb-3">

<label class="form-label">
School / Organization
</label>

<input
type="text"
name="organization"
class="form-control"
placeholder="Organization Name">

</div>

<div class="mb-3">

<label class="form-label">
Designation
</label>

<input
type="text"
name="designation"
class="form-control"
placeholder="Teacher / Student / Coordinator">

</div>

<div class="mb-4">

<label class="form-label">
Category
</label>

<select
name="category"
class="form-select">

<option value="Teacher">Teacher</option>
<option value="Student">Student</option>
<option value="Volunteer">Volunteer</option>
<option value="Guest">Guest</option>

</select>

</div>

<div class="row">

<div class="col-md-6 mb-2">

<button
type="submit"
class="btn btn-success btn-register w-100">

✅ Register Participant

</button>

</div>

<div class="col-md-6">

<a
href="/"
class="btn btn-secondary btn-register w-100">

🏠 Back to Home

</a>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
