<section class="hero hero-priority-events">

    <div class="container">

        <div class="row align-items-center justify-content-center">

            <div class="col-xl-10 col-lg-11">

                <div class="glass hero-content hero-event-panel">

                    <div class="hero-brand-block">
                        <h1 class="hero-brand-name">
                            VANDURAI EVENTS
                        </h1>
                        <div class="hero-brand-location">
                            THANJAVUR
                        </div>
                    </div>

                    <h2 class="brand-welcome-title">
                        Priority Events
                    </h2>

                    {% if priority_items %}
                    <div class="hero-priority-grid">
                        {% for item in priority_items %}
                        <a
                            href="{{ item.url if not item.disabled else '#' }}"
                            class="priority-event-link {% if item.disabled %}disabled{% endif %}">
                            <span class="latest-dot">{{ 'RESULT' if item.kind == 'result' else 'LATEST' }}</span>
                            <span style='font-family: {{ item.font_family|default("Poppins", true)|tojson }}, sans-serif;'>{{ item.title }}</span>
                        </a>
                        {% endfor %}
                    </div>
                    {% else %}
                    <div class="text-white fs-4 fw-bold">
                        No priority events are available right now.
                    </div>
                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</section>
