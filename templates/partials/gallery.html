<section class="container mt-5">
    <h2 class="text-center">Event Gallery</h2>

    <div id="eventGalleryCarousel" class="carousel slide event-gallery-carousel" data-bs-ride="carousel" data-bs-interval="4000">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#eventGalleryCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Gallery image 1"></button>
            <button type="button" data-bs-target="#eventGalleryCarousel" data-bs-slide-to="1" aria-label="Gallery image 2"></button>
            <button type="button" data-bs-target="#eventGalleryCarousel" data-bs-slide-to="2" aria-label="Gallery image 3"></button>
        </div>

        <div class="carousel-inner rounded shadow">
            <div class="carousel-item active">
                <img src="{{ url_for('static', filename='images/gallery1.jpg') }}" class="d-block w-100" alt="Vandurai Events gallery image 1">
            </div>
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='images/gallery2.png') }}" class="d-block w-100" alt="Vandurai Events gallery image 2">
            </div>
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='images/gallery3.png') }}" class="d-block w-100" alt="Vandurai Events gallery image 3">
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#eventGalleryCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#eventGalleryCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</section>
