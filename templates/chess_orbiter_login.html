<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><title>Chess Orbiter Login</title></head><body class="bg-light"><main class="container py-5" style="max-width:460px"><div class="card shadow-sm"><div class="card-body p-4"><h3>Chess Orbiter Login</h3><p class="text-muted">Enter results only for your assigned boards.</p>{% if error %}<div class="alert alert-danger">{{error}}</div>{% endif %}<form method="post"><input class="form-control mb-3" name="username" placeholder="Username" required><input class="form-control mb-3" type="password" name="password" placeholder="Password" required><button class="btn btn-primary w-100">Login</button></form></div></div></main></body></html>
